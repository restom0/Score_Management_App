name: Sonar Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  scan:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: golden-owl-backend/pom.xml

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: golden-owl-frontend/package-lock.json

      - name: Build backend
        working-directory: golden-owl-backend
        run: ./mvnw -B -DskipTests package

      - name: Install frontend dependencies
        working-directory: golden-owl-frontend
        run: npm ci

      - name: Build frontend
        working-directory: golden-owl-frontend
        run: npm run build

      - name: Prepare Sonar configuration
        id: sonar
        shell: bash
        run: |
          if [[ -z "$SONAR_TOKEN" || -z "$SONAR_PROJECT_KEY" ]]; then
            echo "Missing SONAR_TOKEN secret or SONAR_PROJECT_KEY repository variable."
            exit 1
          fi

          if [[ "$SONAR_HOST_URL" == "https://sonarcloud.io" && -z "$SONAR_ORGANIZATION" ]]; then
            echo "Missing SONAR_ORGANIZATION repository variable for SonarQube Cloud."
            exit 1
          fi

          args="-Dsonar.projectKey=$SONAR_PROJECT_KEY"
          if [[ -n "$SONAR_ORGANIZATION" ]]; then
            args="$args -Dsonar.organization=$SONAR_ORGANIZATION"
          fi
          args="$args -Dsonar.sources=golden-owl-backend/src/main/java,golden-owl-frontend/src"
          args="$args -Dsonar.tests=golden-owl-backend/src/test/java"
          args="$args -Dsonar.java.binaries=golden-owl-backend/target/classes"
          args="$args -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/.mvn/**,**/data/**"
          echo "args=$args" >> "$GITHUB_OUTPUT"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: ${{ steps.sonar.outputs.args }}
