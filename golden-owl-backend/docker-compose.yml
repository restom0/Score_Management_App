services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: golden_owl
      POSTGRES_USER: golden_owl
      POSTGRES_PASSWORD: golden_owl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/golden_owl
      SPRING_DATASOURCE_USERNAME: golden_owl
      SPRING_DATASOURCE_PASSWORD: golden_owl
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SCORES_CSV_PATH: sql/seeder/diem_thi_thpt_2024.csv
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8080:8080"

volumes:
  postgres_data:
